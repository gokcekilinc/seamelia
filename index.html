<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seamelia Beach Resort & Spa - WhatsApp Concierge</title>
    <style>
        /* Lüks ve Kurumsal Otel Teması Tasarımı */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #fcfbf7; /* Şık krem arka plan */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 24/7 Banner */
        .banner-24-7 {
            background: linear-gradient(135deg, #bc9c6c 0%, #a38456 100%);
            color: #ffffff;
            padding: 12px 20px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 12px rgba(188, 156, 108, 0.2);
        }

        .banner-24-7 .icon {
            font-size: 16px;
            margin-right: 6px;
        }

        .card {
            background-color: #ffffff;
            width: 100%;
            max-width: 420px;
            margin: 20px;
            padding: 35px 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            border: 1px solid #f4efe2;
            text-align: center;
            box-sizing: border-box;
        }

        /* Dil Seçim Butonları Alanı */
        .lang-selector {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 25px;
        }

        .lang-btn {
            background-color: #faf8f2;
            border: 1px solid #eae5d8;
            color: #666;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .lang-btn.active, .lang-btn:hover {
            background-color: #bc9c6c; /* Seamelia Altın/Bronz Rengi */
            border-color: #bc9c6c;
            color: #ffffff;
        }

        /* Logo Tasarımı */
        .logo-container {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-container img {
            max-width: 130px;
            max-height: 130px;
            width: auto;
            height: auto;
            display: block;
            object-fit: contain;
        }

        h1 {
            color: #bc9c6c;
            font-size: 22px;
            font-weight: 600;
            margin: 0 0 12px 0;
            line-height: 1.3;
        }

        p {
            color: #666666;
            font-size: 14px;
            margin: 0 0 25px 0;
            line-height: 1.5;
        }

        /* Form Elemanları */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #eae5d8;
            border-radius: 8px;
            font-size: 15px;
            background-color: #faf8f2;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #bc9c6c;
            background-color: #ffffff;
        }

        /* Working Hours Section */
        .working-hours {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            background-color: #faf8f2;
            border: 1px solid #eae5d8;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
        }

        .working-hours .icon {
            font-size: 24px;
            flex-shrink: 0;
        }

        .working-hours div {
            flex: 1;
        }

        .working-hours strong {
            color: #bc9c6c;
            display: block;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .working-hours small {
            color: #666;
            font-size: 12px;
            line-height: 1.4;
            display: block;
        }

        .working-hours small b {
            color: #333;
            font-weight: 600;
        }

        /* KVKK Onay Kutusu Alanı */
        .privacy-group {
            display: flex;
            align-items: flex-start;
            text-align: left;
            margin-bottom: 25px;
            gap: 10px;
        }

        .privacy-group input[type="checkbox"] {
            margin-top: 3px;
            accent-color: #bc9c6c;
            cursor: pointer;
        }

        .privacy-text {
            font-size: 12px;
            color: #666;
            line-height: 1.4;
        }

        .privacy-text a {
            color: #bc9c6c;
            text-decoration: underline;
            font-weight: 600;
        }

        /* Bağlan Butonu */
        .submit-btn {
            background-color: #bc9c6c;
            color: #ffffff;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .submit-btn:hover {
            background-color: #a38456;
        }
    </style>
</head>
<body>

    <!-- 24/7 WhatsApp Support Banner -->
    <div class="banner-24-7">
        <span class="icon">📱</span>
        <span id="banner-text">...</span>
    </div>

    <div class="card">
        
        <!-- Üst Kısım: Dil Seçenekleri (TR eklendi) -->
        <div class="lang-selector">
            <button type="button" id="btn-tr" class="lang-btn" onclick="setLanguage('tr')">TR</button>
            <button type="button" id="btn-en" class="lang-btn" onclick="setLanguage('en')">EN</button>
            <button type="button" id="btn-de" class="lang-btn" onclick="setLanguage('de')">DE</button>
            <button type="button" id="btn-ru" class="lang-btn" onclick="setLanguage('ru')">RU</button>
        </div>

        <!-- Logo Alanı -->
        <div class="logo-container">
            <img src="logo.png" alt="Seamelia Beach Resort Logo">
        </div>

        <!-- Dinamik Başlıklar -->
        <h1 id="welcome-title">Seamelia Beach Resort & Spa</h1>
        <p id="welcome-subtitle">...</p>

        <!-- Giriş Formu -->
        <form onsubmit="redirectToWhatsApp(event)">
            
            <div class="form-group">
                <label id="room-label" for="room-input">Oda Numarası</label>
                <input type="text" id="room-input" required>
            </div>

            <!-- Working Hours Section -->
            <div class="working-hours">
                <span class="icon">🕘</span>
                <div>
                    <strong id="working-hours-title">Çalışma Saatleri</strong>
                    <small id="working-hours-text">...</small>
                </div>
            </div>

            <!-- KVKK Onay Kutusu ve Linki -->
            <div class="privacy-group">
                <input type="checkbox" id="privacy-checkbox" required>
                <span class="privacy-text">
                    <span id="privacy-main-text">...</span>
                    <a href="privacy.html" id="privacy-link" target="_blank">...</a>
                </span>
            </div>

            <!-- Gönderim Butonu -->
            <button type="submit" id="submit-btn" class="submit-btn">...</button>

        </form>
    </div>

    <!-- Akıllı Dil Algılama ve Yönetim Motoru -->
    <script>
        const translations = {
            tr: {
                banner: "📱 WhatsApp ile 24/7 bize ulaşabilirsiniz. Yanıtlarımız 09:00-16:00 saatleri arasında verilir.",
                welcome: "Seamelia Beach Resort & Spa'ya Hoş Geldiniz",
                subtitle: "Hizmetlerimize hızlıca ulaşmak ve bizimle WhatsApp üzerinden iletişime geçmek için lütfen bilgilerinizi giriniz.",
                roomLabel: "Oda Numarası",
                roomPlaceholder: "Örn: 1402",
                button: "WhatsApp Concierge'a Bağlan",
                privacyText: "Kişisel verilerinizin işlenmesine ilişkin ",
                privacyLink: "Aydınlatma Metni'ni okudum ve kabul ediyorum.",
                workingHoursTitle: "Çalışma Saatleri",
                workingHoursText: "Misafir İlişkileri ekibimiz her gün <b>09:00 - 16:00</b> saatleri arasında hizmetinizdedir.<br>Bu saatlerin dışında da WhatsApp mesajı gönderebilirsiniz. En kısa sürede yanıtlanacaktır."
            },
            en: {
                banner: "📱 Contact us 24/7 via WhatsApp. Responses are provided between 09:00-16:00.",
                welcome: "Welcome to Seamelia Beach Resort & Spa",
                subtitle: "Please enter your information to quickly access our services and contact us via WhatsApp.",
                roomLabel: "Room Number",
                roomPlaceholder: "E.g.: 1402",
                button: "Connect to WhatsApp Concierge",
                privacyText: "I have read and accept the ",
                privacyLink: "Clarification Text regarding data processing.",
                workingHoursTitle: "Guest Relations Working Hours",
                workingHoursText: "Our Guest Relations team is available daily from <b>09:00 - 16:00</b>.<br>Outside these hours, you can still send us a WhatsApp message. We will reply as soon as possible."
            },
            de: {
                banner: "📱 Kontaktieren Sie uns 24/7 über WhatsApp. Antworten erfolgen zwischen 09:00-16:00 Uhr.",
                welcome: "Willkommen im Seamelia Beach Resort & Spa",
                subtitle: "Bitte geben Sie Ihre Daten ein, um schnell auf unsere Dienste zuzugreifen und uns per WhatsApp zu kontaktieren.",
                roomLabel: "Zimmernummer",
                roomPlaceholder: "Z.B.: 1402",
                button: "Mit WhatsApp Concierge verbinden",
                privacyText: "Ich habe den ",
                privacyLink: "Aufklärungstext zur Datenverarbeitung gelesen und akzeptiere ihn.",
                workingHoursTitle: "Öffnungszeiten der Gästebetreuung",
                workingHoursText: "Unser Gästeservice-Team ist täglich von <b>09:00 - 16:00</b> Uhr für Sie erreichbar.<br>Außerhalb dieser Zeiten können Sie uns auch eine WhatsApp-Nachricht senden. Wir antworten schnellstmöglich."
            },
            ru: {
                banner: "📱 Свяжитесь с нами 24/7 через WhatsApp. Ответы даются с 09:00 до 16:00.",
                welcome: "Добро пожаловать в Seamelia Beach Resort & Spa",
                subtitle: "Пожалуйста, введите свои данные, чтобы быстро получить доступ к нашим услугам и связаться с нами через WhatsApp.",
                roomLabel: "Номер комнаты",
                roomPlaceholder: "Напр: 1402",
                button: "Подключиться к WhatsApp Concierge",
                privacyText: "Я прочитал и принимаю ",
                privacyLink: "Разъяснительный текст касательно обработки данных.",
                workingHoursTitle: "Время работы отдела обслуживания гостей",
                workingHoursText: "Наша команда по обслуживанию гостей работает ежедневно с <b>09:00 до 16:00</b>.<br>В остальное время вы можете отправить нам сообщение в WhatsApp. Мы ответим как можно скорее."
            }
        };

        function setLanguage(lang) {
            document.getElementById('banner-text').textContent = translations[lang].banner;
            document.getElementById('welcome-title').textContent = translations[lang].welcome;
            document.getElementById('welcome-subtitle').textContent = translations[lang].subtitle;
            document.getElementById('room-label').textContent = translations[lang].roomLabel;
            document.getElementById('room-input').placeholder = translations[lang].roomPlaceholder;
            document.getElementById('submit-btn').textContent = translations[lang].button;
            document.getElementById('privacy-main-text').textContent = translations[lang].privacyText;
            document.getElementById('privacy-link').textContent = translations[lang].privacyLink;
            document.getElementById('working-hours-title').textContent = translations[lang].workingHoursTitle;
            document.getElementById('working-hours-text').innerHTML = translations[lang].workingHoursText;
            
            // Aktif dil butonunun rengini güncelleme
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${lang}`).classList.add('active');
        }

        // Akıllı Dil Algılama (Desteklenmeyen bir dil ise direkt EN - İngilizce atar)
        window.addEventListener('DOMContentLoaded', () => {
            const userLang = (navigator.language || navigator.userLanguage).toLowerCase();
            let defaultLang = 'en'; // Güvenli liman: İngilizce fallback
            
            if (userLang.startsWith('tr')) {
                defaultLang = 'tr';
            } else if (userLang.startsWith('de')) {
                defaultLang = 'de';
            } else if (userLang.startsWith('ru')) {
                defaultLang = 'ru';
            }
            
            setLanguage(defaultLang);
        });

        // Form Gönderildiğinde Çalışacak WhatsApp Yönlendirmesi
        function redirectToWhatsApp(event) {
            event.preventDefault();
            const roomNumber = document.getElementById('room-input').value;
            
            // Buraya otelin resmi hat numarasını uluslararası formatta yazabilirsin (Örn: 905XXXXXXXXX)
            const phoneNumber = "905309756982"; 
            const message = `Seamelia Concierge - Room/Oda: ${roomNumber}`;
            
            window.location.href = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;
        }
    </script>
</body>
</html>
