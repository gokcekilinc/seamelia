<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seamelia Beach Resort & Spa - WhatsApp Concierge</title>
    <style>
        /* Lüks ve Kurumsal Otel Teması Tasarımı */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #fcfbf7; /* Şık krem arka plan */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 24/7 Banner */
        .banner-24-7 {
            background: linear-gradient(135deg, #bc9c6c 0%, #a38456 100%);
            color: #ffffff;
            padding: 12px 20px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 12px rgba(188, 156, 108, 0.2);
        }

        .banner-24-7 .icon {
            font-size: 16px;
            margin-right: 6px;
        }

        .card {
            background-color: #ffffff;
            width: 100%;
            max-width: 420px;
            margin: 20px;
            padding: 35px 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            border: 1px solid #f4efe2;
            text-align: center;
            box-sizing: border-box;
        }

        /* Dil Seçim Butonları Alanı */
        .lang-selector {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 25px;
        }

        .lang-btn {
            background-color: #faf8f2;
            border: 1px solid #eae5d8;
            color: #666;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .lang-btn.active, .lang-btn:hover {
            background-color: #bc9c6c; /* Seamelia Altın/Bronz Rengi */
            border-color: #bc9c6c;
            color: #ffffff;
        }

        /* Logo Tasarımı */
        .logo-container {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-container img {
            max-width: 130px;
            max-height: 130px;
            width: auto;
            height: auto;
            display: block;
            object-fit: contain;
        }

        h1 {
            color: #bc9c6c;
            font-size: 22px;
            font-weight: 600;
            margin: 0 0 12px 0;
            line-height: 1.3;
        }

        p {
            color: #666666;
            font-size: 14px;
            margin: 0 0 25px 0;
            line-height: 1.5;
        }

        /* Form Elemanları */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #eae5d8;
            border-radius: 8px;
            font-size: 15px;
            background-color: #faf8f2;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #bc9c6c;
            background-color: #ffffff;
        }

        /* Working Hours Section */
        .working-hours {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            background-color: #faf8f2;
            border: 1px solid #eae5d8;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
        }

        .working-hours .icon {
            font-size: 24px;
            flex-shrink: 0;
        }

        .working-hours div {
            flex: 1;
        }

        .working-hours strong {
            color: #bc9c6c;
            display: block;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .working-hours small {
            color: #666;
            font-size: 12px;
            line-height: 1.4;
            display: block;
        }

        .working-hours small b {
            color: #333;
            font-weight: 600;
        }

        /* KVKK Onay Kutusu Alanı */
        .privacy-group {
            display: flex;
            align-items: flex-start;
            text-align: left;
            margin-bottom: 25px;
            gap: 10px;
        }

        .privacy-group input[type="checkbox"] {
            margin-top: 3px;
            accent-color: #bc9c6c;
            cursor: pointer;
        }

        .privacy-text {
            font-size: 12px;
            color: #666;
            line-height: 1.4;
        }

        .privacy-text a {
            color: #bc9c6c;
            text-decoration: underline;
            font-weight: 600;
        }
